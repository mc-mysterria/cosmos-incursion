# ~ Cosmos Incursion Configuration ~

event:
  # Enable automatic event start when conditions are met
  auto-start: false

  # Minimum players online to trigger event
  min-players: 30

  # Cooldown between events (in minutes)
  cooldown-minutes: 120

  # Event duration (in minutes)
  duration-minutes: 30

  # Countdown before event starts (in seconds)
  countdown-seconds: 60

zones:
  # Number of zones to create
  base-count: 1

  # Additional zone per X players (e.g., 2 zones at 30, 3 zones at 50)
  players-per-zone: 20

  # Maximum zones regardless of player count
  max-count: 5

  # Zone radius in blocks
  radius: 150

  # Minimum distance from town claims (in blocks)
  town-buffer: 50

  # Minimum distance between zone centers
  min-separation: 500

  # How many zones of each tier to spawn per event.
  # Zones are assigned in order: green first, death last.
  # If more zones are generated than the sum here, extras default to GREEN.
  tier-distribution:
    green: 1
    yellow: 1
    red: 1
    death: 1

  # Per-tier rules. drop-chance is 0.0 (keep all) to 1.0 (drop all).
  # reward-command runs as console on kill; use %player% for the killer's name.
  # particle-color is a 6-digit hex RGB string (no '#'). Leave blank for defaults.
  tiers:
    green:
      drop-chance: 0.0
      reward-command: ""
      particle-color: "00DC00"
    yellow:
      drop-chance: 0.33
      reward-command: ""
      particle-color: "FFDC00"
    red:
      drop-chance: 1.0
      reward-command: ""
      particle-color: "FF3C3C"
    death:
      drop-chance: 1.0
      reward-command: ""
      particle-color: "500000"

  # Zone boundary particles
  boundary-particles-enabled: true
  boundary-particle-update-ticks: 40  # How often to spawn particles (40 ticks = 2 seconds)
  boundary-particle-view-distance: 50.0  # How close players need to be to see particles

balancing:
  spirit-weight:
    # Sequences affected by Spirit Weight (high-tier penalties)
    min-sequence: 4
    max-sequence: 5

    # DOT damage per tick
    dot-damage: 1.0

    # Ticks between DOT damage (100 ticks = 5 seconds)
    dot-interval-ticks: 100

  anti-grief:
    # Number of low-tier kills before marked as Corrupted Monster
    kill-threshold: 3

    # Time window for kill tracking (in seconds)
    time-window-seconds: 600

    # Sequence difference to count as "griefing"
    sequence-difference: 3

    # Duration of Corrupted Monster status (in minutes)
    corrupted-duration-minutes: 15

death:
  # Sequence that triggers regression penalty
  regression-sequence: 6

  # Percentage of acting restored after sequence regression (0.0 - 1.0)
  # When player doesn't have enough acting to lose, they regress and get this % back
  # Example: 0.8 = receive 80% of new sequence's needed acting
  regression-acting-restored: 0.99

  # Percentage of acting lost as penalty (0.0 - 1.0)
  # If player has this % of needed acting: just lose it (no regression, no char drop)
  # If player has less: full sequence regression (with acting restored, drops char)
  # Example: 0.5 = need 50% of needed acting to avoid regression
  regression-acting-penalty: 0.5

  # Cooldown between death penalties (in seconds)
  # Prevents players from regressing multiple times in quick succession
  # Example: 60 = 1 minute cooldown between death penalties
  death-penalty-cooldown-seconds: 20

  # Command to grant Cosmos Crate (placeholder: %player%)
  crate-command: "emp admin crate give %player% pvp 1"

combat-log:
  # How long Hollow Body NPC persists (in minutes)
  npc-duration-minutes: 5

  # NPC name format (placeholder: %player%)
  npc-name-format: "Hollow %player%"

beacons:
  # Capture radius around beacon
  capture-radius: 20

  # Points needed to fully capture
  capture-points: 100

  # Points per player per second
  points-per-player: 1

  # Decay rate when uncontested (points per second)
  decay-rate: 0.5

rewards:
  # Acting speed multiplier for winning town (1.10 = 10% bonus)
  acting-speed-bonus: 1.10

  # Duration of buff (in hours)
  buff-duration-hours: 24

  # Resources deposited to the winning town's balance at the end of each incursion event.
  # Each zone that was active contributes the reward for its tier.
  # Example: an event with 1 GREEN + 1 RED + 1 DEATH zone gives green + red + death rewards.
  winner-resources:
    green:
      gold: 10.0
      silver: 20.0
      gems: 5.0
    yellow:
      gold: 25.0
      silver: 50.0
      gems: 12.0
    red:
      gold: 50.0
      silver: 100.0
      gems: 25.0
    death:
      gold: 100.0
      silver: 200.0
      gems: 50.0

permanent-zones:
  # Number of Points of Interest active simultaneously per zone
  poi-count: 3
  # How long each PoI stays active before rotating (seconds)
  poi-duration-seconds: 300
  # Number of extraction points active simultaneously per zone
  extraction-point-count: 2
  # How long each extraction point stays active (seconds)
  extraction-point-duration-seconds: 180
  # Radius (blocks) within which a player accumulates resources from a PoI
  poi-capture-radius: 8.0
  # Radius (blocks) within which a player can begin an extraction channel
  extraction-radius: 6.0
  # How long (seconds) a player must stand at an extraction point to extract resources
  extraction-channel-seconds: 10
  # How many blocks outside the zone boundary the player is teleported after successful extraction
  extraction-exit-buffer: 15.0
  # Enable particle effects for zone boundaries, PoIs, and extraction points
  particles-enabled: true
  # How far away (blocks) players can see permanent zone particles
  particle-view-distance: 64.0
  # Minimum seconds before a depleted/expired PoI respawns (random delay in this range)
  poi-respawn-min-seconds: 120
  # Maximum seconds before a depleted/expired PoI respawns
  poi-respawn-max-seconds: 300

  # Base extraction rate from a PoI
  # Example: 1.0 amount per 10 seconds (ticks every second, so 0.1/s)
  poi-base-amount: 1.0
  poi-base-interval: 10

  # Bonus extraction rate for staying at the PoI
  # For every bonus-interval (seconds) a player stays, the amount extracted per base-interval
  # increases by bonus-amount.
  # Example: base 1.0/10s, bonus 0.5 every 30s.
  # At 0s-29s: 1.0/10s. At 30s-59s: 1.5/10s. At 60s+: 2.0/10s.
  poi-bonus-amount: 0.5
  poi-bonus-interval: 30

  # Custom icons shown on the map for each PoI resource type.
  # Set to a file path relative to the CosmosIncursion plugin data folder
  # (e.g., "icons/gold_ingot.png"). Leave empty to use the default colored circle.
  # Icons must be PNG files. Recommended size: 32x32 pixels.
  poi-icons:
    gold: ""
    silver: ""
    gems: ""
    # Display size of icons on the map in pixels
    size: 32

  # Per-tier configuration for permanent extraction zones.
  #
  # drop-chance    — probability each inventory item slot drops on death inside the zone
  #                  (0.0 = nothing, 1.0 = full drop). Resource buffer is always lost on death.
  #
  # daily-budget   — total units of each resource this zone tier can produce per 24-hour period.
  #                  Once the budget for a resource is exhausted, no more PoIs of that type
  #                  spawn until the next day resets. Set these to control how much players
  #                  can earn from this zone each day.
  #
  # poi-cap        — maximum units a single PoI can hold for each resource type.
  #                  Extraction rate is defined by poi-base-amount/interval above.
  #                  Multiple players at once will drain the PoI faster.
  #                  Example: daily-budget gems = 20, poi-cap gems = 5 -> up to 4 gems PoIs per day.
  tiers:
    safe:
      drop-chance: 0.0
      daily-budget:
        gold: 30.0
        silver: 60.0
        gems: 15.0
      poi-cap:
        gold: 3.0
        silver: 6.0
        gems: 1.5
    medium:
      drop-chance: 0.33
      daily-budget:
        gold: 60.0
        silver: 150.0
        gems: 30.0
      poi-cap:
        gold: 6.0
        silver: 15.0
        gems: 3.0
    hard:
      drop-chance: 1.0
      daily-budget:
        gold: 120.0
        silver: 300.0
        gems: 60.0
      poi-cap:
        gold: 12.0
        silver: 30.0
        gems: 6.0

messages:
  event-starting: "<red>[Cosmos Incursion]</red> <white>An incursion begins in %countdown% seconds!</white>"
  event-started: "<red>[Cosmos Incursion]</red> <white>The incursion has begun! %zones% zones active.</white>"
  event-time-remaining: "<red>[Cosmos Incursion]</red> <yellow>%minutes% minutes remaining!</yellow> <gray>Contest the beacons while you can!</gray>"
  event-ending: "<red>[Cosmos Incursion]</red> <white>The incursion is ending...</white>"
  event-ended: "<red>[Cosmos Incursion]</red> <white>The incursion has concluded.</white>"
  zone-entry: "<red>The barrier of reality dissolves...</red>"
  zone-exit: "<green>You have left the incursion zone.</green>"
  corrupted-monster: "<dark_red>%player% has become a Corrupted Monster!</dark_red>"
  death-regression: "<red>Your sequence has regressed due to death in the incursion.</red>"
  paper-angel-saved: "<green>Your Paper Angel has protected you from regression!</green>"
